<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovoBanco — Minha conta</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0f14;
  --surface: #151820;
  --surface2: #1c202c;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --gold: #c9a84c;
  --gold-light: #e8c97a;
  --gold-dim: rgba(201,168,76,0.12);
  --green: #3ecf8e;
  --green-dim: rgba(62,207,142,0.1);
  --red: #f56565;
  --red-dim: rgba(245,101,101,0.1);
  --blue: #60a5fa;
  --blue-dim: rgba(96,165,250,0.1);
  --text: #f0eee8;
  --text2: #8a8e9a;
  --text3: #555a6a;
  --r: 14px;
  --r-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* AUTH */
.auth-wrap {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem 1rem;
  background: var(--bg);
}
.auth-card {
  width: 100%;
  max-width: 400px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 2.5rem 2rem;
  animation: fadeUp .4s ease;
}
@keyframes fadeUp { from { opacity:0; transform: translateY(16px); } to { opacity:1; transform: none; } }
.auth-logo { font-family: 'DM Serif Display', serif; font-size: 26px; color: var(--gold); text-align: center; margin-bottom: .25rem; }
.auth-logo span { color: var(--text); }
.auth-sub { text-align: center; font-size: 13px; color: var(--text3); margin-bottom: 2rem; }
.tabs { display: flex; background: var(--surface2); border-radius: var(--r-sm); padding: 3px; margin-bottom: 1.75rem; }
.tab { flex: 1; padding: .5rem; text-align: center; font-size: 13px; font-weight: 500; color: var(--text2); cursor: pointer; border-radius: 6px; transition: all .2s; }
.tab.active { background: var(--surface); color: var(--text); border: 1px solid var(--border2); }
.field { margin-bottom: 1rem; }
.field label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); font-weight: 600; margin-bottom: 5px; }
.field input {
  width: 100%; background: var(--bg); border: 1px solid var(--border2);
  border-radius: var(--r-sm); color: var(--text); font-family: 'DM Sans', sans-serif;
  font-size: 15px; padding: .65rem .9rem; outline: none; transition: border-color .2s;
}
.field input:focus { border-color: rgba(201,168,76,0.5); box-shadow: 0 0 0 3px rgba(201,168,76,0.07); }
.field input::placeholder { color: var(--text3); }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.btn-primary {
  width: 100%; padding: .75rem; border: none; border-radius: var(--r-sm);
  background: linear-gradient(135deg, #c9a84c, #e8c97a); color: #1a1500;
  font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600;
  cursor: pointer; margin-top: .5rem; transition: all .2s; letter-spacing: -0.01em;
}
.btn-primary:hover { opacity: .9; transform: translateY(-1px); }
.btn-primary:active { transform: scale(0.98); }
.err-msg { font-size: 13px; color: var(--red); text-align: center; margin-top: .75rem; min-height: 20px; }

/* APP */
.app-wrap { display: none; min-height: 100vh; flex-direction: column; }
.app-wrap.show { display: flex; }

nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 1rem 2rem; border-bottom: 1px solid var(--border);
  background: var(--surface); position: sticky; top: 0; z-index: 10;
}
.nav-logo { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--gold); }
.nav-logo span { color: var(--text); }
.nav-user { display: flex; align-items: center; gap: 10px; }
.nav-name { font-size: 14px; font-weight: 500; color: var(--text2); }
.btn-logout {
  padding: 5px 12px; background: transparent; border: 1px solid var(--border2);
  border-radius: 6px; color: var(--text3); font-size: 12px; font-weight: 500;
  cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all .2s;
}
.btn-logout:hover { color: var(--red); border-color: rgba(245,101,101,0.3); }

main { flex: 1; padding: 2.5rem 1rem; max-width: 680px; margin: 0 auto; width: 100%; }

.hero-card {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 2rem;
  margin-bottom: 1.5rem;
  position: relative;
  overflow: hidden;
}
.hero-card::after {
  content: '';
  position: absolute;
  top: -80px; right: -80px;
  width: 220px; height: 220px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(201,168,76,0.07) 0%, transparent 70%);
  pointer-events: none;
}
.hero-greeting { font-size: 13px; color: var(--text3); margin-bottom: 4px; }
.hero-name { font-family: 'DM Serif Display', serif; font-size: 26px; font-weight: 400; color: var(--text); margin-bottom: 1.5rem; }
.bal-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text3); margin-bottom: 6px; }
.bal-value { font-family: 'DM Serif Display', serif; font-size: 48px; color: var(--green); letter-spacing: -0.03em; line-height: 1; }
.bal-value .cur { font-family: 'DM Sans', sans-serif; font-size: 20px; font-weight: 300; color: var(--text2); margin-right: 6px; }
.hero-meta { display: flex; gap: 10px; margin-top: 1.25rem; flex-wrap: wrap; }
.chip { font-size: 11px; color: var(--text2); background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 4px 12px; }

.action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1.5rem; }
.btn-action {
  padding: 1rem; border-radius: var(--r-sm); border: 1px solid; cursor: pointer;
  font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600;
  transition: all .2s; display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-dep { background: var(--green-dim); color: var(--green); border-color: rgba(62,207,142,0.2); }
.btn-dep:hover { background: rgba(62,207,142,0.18); transform: translateY(-1px); }
.btn-saq { background: var(--red-dim); color: var(--red); border-color: rgba(245,101,101,0.2); }
.btn-saq:hover { background: rgba(245,101,101,0.18); transform: translateY(-1px); }

.section-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; }
.section-header { padding: .85rem 1.25rem; border-bottom: 1px solid var(--border); font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text3); font-weight: 600; }
.tx-row { display: flex; align-items: center; padding: .85rem 1.25rem; border-bottom: 1px solid var(--border); gap: 12px; transition: background .15s; }
.tx-row:last-child { border-bottom: none; }
.tx-row:hover { background: var(--surface2); }
.tx-icon { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; font-weight: 600; }
.tx-icon.dep { background: var(--green-dim); color: var(--green); }
.tx-icon.saq { background: var(--red-dim); color: var(--red); }
.tx-info { flex: 1; }
.tx-type { font-size: 14px; font-weight: 500; color: var(--text); }
.tx-date { font-size: 12px; color: var(--text3); margin-top: 2px; }
.tx-val { font-size: 15px; font-weight: 600; }
.tx-val.dep { color: var(--green); }
.tx-val.saq { color: var(--red); }
.no-tx { padding: 2.5rem; text-align: center; font-size: 14px; color: var(--text3); }

/* MODAL */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(4px); z-index: 100; align-items: center; justify-content: center; padding: 1rem; }
.modal-overlay.open { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border2); border-radius: 18px; width: 100%; max-width: 380px; padding: 2rem; animation: fadeUp .25s ease; }
.modal h3 { font-family: 'DM Serif Display', serif; font-size: 22px; font-weight: 400; color: var(--text); margin-bottom: 1.25rem; }
.op-ctx { background: var(--bg); border: 1px solid var(--border); border-radius: var(--r-sm); padding: .75rem 1rem; margin-bottom: 1.25rem; display: flex; justify-content: space-between; align-items: center; }
.op-ctx-name { font-size: 13px; color: var(--text2); }
.op-ctx-bal { font-size: 13px; font-weight: 600; color: var(--green); }
.modal-btns { display: flex; gap: 10px; margin-top: 1.25rem; }
.btn-cancel { flex: 1; padding: .7rem; background: transparent; border: 1px solid var(--border2); border-radius: var(--r-sm); color: var(--text2); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: all .2s; }
.btn-cancel:hover { background: var(--surface2); }
.btn-ok { flex: 2; padding: .7rem; border: none; border-radius: var(--r-sm); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: all .2s; }
.btn-ok.green { background: var(--green); color: #001a0d; }
.btn-ok.red { background: var(--red); color: #1a0000; }
.btn-ok:hover { opacity:.9; transform: translateY(-1px); }
.loading { opacity: 0.5; pointer-events: none; }

/* TOAST */
#toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--surface); border: 1px solid var(--border2); border-radius: 40px; padding: .6rem 1.5rem; font-size: 14px; font-weight: 500; color: var(--text); opacity: 0; transition: all .3s; z-index: 999; pointer-events: none; white-space: nowrap; }
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
#toast.ok { border-color: rgba(62,207,142,0.4); color: var(--green); }
#toast.err { border-color: rgba(245,101,101,0.4); color: var(--red); }

@media (max-width: 500px) { main { padding: 1.5rem 1rem; } nav { padding: 1rem; } .bal-value { font-size: 36px; } }
</style>
</head>
<body>

<!-- AUTH -->
<div class="auth-wrap" id="auth">
  <div class="auth-card">
    <div class="auth-logo">Novo<span>Banco</span></div>
    <div class="auth-sub">Sua conta digital</div>
    <div class="tabs">
      <div class="tab active" onclick="switchTab('login')">Entrar</div>
      <div class="tab" onclick="switchTab('cadastro')">Criar conta</div>
    </div>

    <!-- LOGIN -->
    <div id="form-login">
      <div class="field"><label>CPF</label><input id="l-cpf" type="text" placeholder="000.000.000-00" maxlength="14" /></div>
      <div class="field"><label>Senha</label><input id="l-senha" type="password" placeholder="••••••" /></div>
      <button class="btn-primary" onclick="login()">Entrar na conta</button>
      <div class="err-msg" id="l-err"></div>
    </div>

    <!-- CADASTRO -->
    <div id="form-cadastro" style="display:none">
      <div class="field"><label>Nome completo</label><input id="c-nome" type="text" placeholder="Ex: Maria Silva" /></div>
      <div class="field-row">
        <div class="field"><label>CPF</label><input id="c-cpf" type="text" placeholder="000.000.000-00" maxlength="14" /></div>
        <div class="field"><label>Idade</label><input id="c-idade" type="number" placeholder="30" min="1" max="120" /></div>
      </div>
      <div class="field"><label>Senha</label><input id="c-senha" type="password" placeholder="Mínimo 6 caracteres" /></div>
      <button class="btn-primary" onclick="cadastrar()">Criar minha conta</button>
      <div class="err-msg" id="c-err"></div>
    </div>
  </div>
</div>

<!-- APP -->
<div class="app-wrap" id="app">
  <nav>
    <div class="nav-logo">Novo<span>Banco</span></div>
    <div class="nav-user">
      <span class="nav-name" id="nav-name"></span>
      <button class="btn-logout" onclick="logout()">Sair</button>
    </div>
  </nav>
  <main>
    <div class="hero-card">
      <div class="hero-greeting">Olá,</div>
      <div class="hero-name" id="hero-name">—</div>
      <div class="bal-label">Saldo disponível</div>
      <div class="bal-value"><span class="cur">R$</span><span id="saldo-val">0,00</span></div>
      <div class="hero-meta">
        <span class="chip" id="chip-cpf"></span>
        <span class="chip" id="chip-idade"></span>
        <span class="chip" id="chip-desde"></span>
      </div>
    </div>

    <div class="action-row">
      <button class="btn-action btn-dep" onclick="abrirOp('deposito')">↑ Depositar</button>
      <button class="btn-action btn-saq" onclick="abrirOp('saque')">↓ Sacar</button>
    </div>

    <div class="section-card">
      <div class="section-header">Extrato</div>
      <div id="extrato-list"><div class="no-tx">Carregando...</div></div>
    </div>
  </main>
</div>

<!-- MODAL OPERAÇÃO -->
<div class="modal-overlay" id="modal-op">
  <div class="modal">
    <h3 id="op-titulo">Depósito</h3>
    <div class="op-ctx">
      <span class="op-ctx-name" id="op-nome"></span>
      <span class="op-ctx-bal" id="op-saldo"></span>
    </div>
    <div class="field"><label>Valor (R$)</label><input id="op-valor" type="number" placeholder="0,00" min="0.01" step="0.01" /></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="fecharModal()">Cancelar</button>
      <button class="btn-ok green" id="op-btn" onclick="confirmarOp()">Confirmar</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const API = 'http://localhost:3001/api';
let token = localStorage.getItem('nb_token');
let clienteData = null;
let opAtual = null;

function fmtCPF(v) {
  v = v.replace(/\D/g,'');
  if (v.length <= 3) return v;
  if (v.length <= 6) return v.slice(0,3)+'.'+v.slice(3);
  if (v.length <= 9) return v.slice(0,3)+'.'+v.slice(3,6)+'.'+v.slice(6);
  return v.slice(0,3)+'.'+v.slice(3,6)+'.'+v.slice(6,9)+'-'+v.slice(9,11);
}
function fmtMoney(v) { return Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtData(d) { return new Date(d).toLocaleString('pt-BR'); }

['l-cpf','c-cpf'].forEach(id => {
  const el = document.getElementById(id);
  if (el) el.addEventListener('input', function() { this.value = fmtCPF(this.value); });
});

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (tab==='login'?i===0:i===1)));
  document.getElementById('form-login').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('form-cadastro').style.display = tab === 'cadastro' ? 'block' : 'none';
}

function toast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'show ' + type;
  clearTimeout(t._t); t._t = setTimeout(() => t.className = '', 2500);
}

function setErr(id, msg) { document.getElementById(id).textContent = msg; }

async function api(method, path, body, useToken=false) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (useToken) opts.headers['Authorization'] = 'Bearer ' + token;
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API + path, opts);
  const data = await res.json();
  if (!res.ok) throw new Error(data.erro || 'Erro desconhecido');
  return data;
}

async function login() {
  setErr('l-err','');
  const cpf = document.getElementById('l-cpf').value;
  const senha = document.getElementById('l-senha').value;
  try {
    const data = await api('POST', '/clientes/login', { cpf, senha });
    token = data.token;
    localStorage.setItem('nb_token', token);
    clienteData = data.cliente;
    mostrarApp();
  } catch(e) { setErr('l-err', e.message); }
}

async function cadastrar() {
  setErr('c-err','');
  const nome = document.getElementById('c-nome').value.trim();
  const cpf = document.getElementById('c-cpf').value;
  const idade = document.getElementById('c-idade').value;
  const senha = document.getElementById('c-senha').value;
  try {
    await api('POST', '/clientes/cadastro', { nome, cpf, idade, senha });
    toast('Conta criada! Faça login.', 'ok');
    switchTab('login');
    document.getElementById('l-cpf').value = cpf;
  } catch(e) { setErr('c-err', e.message); }
}

function logout() {
  localStorage.removeItem('nb_token');
  token = null; clienteData = null;
  document.getElementById('app').classList.remove('show');
  document.getElementById('auth').style.display = 'flex';
}

function mostrarApp() {
  document.getElementById('auth').style.display = 'none';
  document.getElementById('app').classList.add('show');
  atualizarPerfil();
  carregarExtrato();
}

function atualizarPerfil() {
  const c = clienteData;
  document.getElementById('nav-name').textContent = c.nome.split(' ')[0];
  document.getElementById('hero-name').textContent = c.nome;
  document.getElementById('saldo-val').textContent = fmtMoney(c.saldo);
  document.getElementById('chip-cpf').textContent = fmtCPF(c.cpf);
  document.getElementById('chip-idade').textContent = c.idade + ' anos';
  document.getElementById('chip-desde').textContent = 'Desde ' + new Date(c.criado_em).toLocaleDateString('pt-BR');
}

async function carregarExtrato() {
  try {
    const txs = await api('GET', '/clientes/extrato', null, true);
    const el = document.getElementById('extrato-list');
    if (!txs.length) { el.innerHTML = '<div class="no-tx">Nenhuma transação ainda.</div>'; return; }
    el.innerHTML = txs.map(t => `
      <div class="tx-row">
        <div class="tx-icon ${t.tipo==='deposito'?'dep':'saq'}">${t.tipo==='deposito'?'↑':'↓'}</div>
        <div class="tx-info">
          <div class="tx-type">${t.tipo==='deposito'?'Depósito':'Saque'}</div>
          <div class="tx-date">${fmtData(t.criado_em)} · Saldo após: R$ ${fmtMoney(t.saldo_apos)}</div>
        </div>
        <div class="tx-val ${t.tipo==='deposito'?'dep':'saq'}">${t.tipo==='deposito'?'+':'-'}R$ ${fmtMoney(t.valor)}</div>
      </div>`).join('');
  } catch(e) { console.error(e); }
}

async function atualizarSaldo() {
  try {
    const perfil = await api('GET', '/clientes/perfil', null, true);
    clienteData.saldo = perfil.saldo;
    document.getElementById('saldo-val').textContent = fmtMoney(perfil.saldo);
  } catch(e) {}
}

function abrirOp(tipo) {
  opAtual = tipo;
  document.getElementById('op-titulo').textContent = tipo === 'deposito' ? 'Depósito' : 'Saque';
  document.getElementById('op-nome').textContent = clienteData.nome;
  document.getElementById('op-saldo').textContent = 'Saldo: R$ ' + fmtMoney(clienteData.saldo);
  document.getElementById('op-valor').value = '';
  const btn = document.getElementById('op-btn');
  btn.className = 'btn-ok ' + (tipo === 'deposito' ? 'green' : 'red');
  btn.textContent = tipo === 'deposito' ? 'Confirmar depósito' : 'Confirmar saque';
  document.getElementById('modal-op').classList.add('open');
  setTimeout(() => document.getElementById('op-valor').focus(), 100);
}

function fecharModal() { document.getElementById('modal-op').classList.remove('open'); }
document.getElementById('modal-op').addEventListener('click', e => { if(e.target === e.currentTarget) fecharModal(); });
document.addEventListener('keydown', e => { if(e.key==='Escape') fecharModal(); });

async function confirmarOp() {
  const valor = parseFloat(document.getElementById('op-valor').value);
  if (!valor || valor <= 0) { toast('Informe um valor válido','err'); return; }
  const btn = document.getElementById('op-btn');
  btn.classList.add('loading');
  try {
    const rota = opAtual === 'deposito' ? '/clientes/depositar' : '/clientes/sacar';
    const res = await api('POST', rota, { valor }, true);
    clienteData.saldo = res.saldo;
    fecharModal();
    atualizarPerfil();
    carregarExtrato();
    toast(res.mensagem, 'ok');
  } catch(e) { toast(e.message, 'err'); }
  finally { btn.classList.remove('loading'); }
}

// Auto-login se já tiver token
if (token) {
  api('GET', '/clientes/perfil', null, true)
    .then(perfil => { clienteData = perfil; mostrarApp(); })
    .catch(() => { localStorage.removeItem('nb_token'); token = null; });
}
</script>
</body>
</html>
